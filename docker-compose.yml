services:
  app:
    build: .
    container_name: cliplink-app
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":50051"
      DATABASE_URL: "postgres://cliplink:cliplink@postgres:5432/cliplink?sslmode=disable"
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: cliplink-postgres
    environment:
      POSTGRES_DB: cliplink
      POSTGRES_USER: cliplink
      POSTGRES_PASSWORD: cliplink
    ports:
      - "5433:5432"
    volumes:
      - cliplink-postgres-data:/var/lib/postgresql/data
      - ./migrations/001_create_links.sql:/docker-entrypoint-initdb.d/001_create_links.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliplink -d cliplink"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cliplink-postgres-data: